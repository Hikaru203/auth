server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: smtp.mailtrap.io
    port: 587
    username: ${MAIL_USERNAME:your-mailtrap-username}
    password: ${MAIL_PASSWORD:your-mailtrap-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: noreply@auth-service.local

  cache:
    type: simple

# JWT Configuration
jwt:
  private-key-path: classpath:keys/private.pem
  public-key-path: classpath:keys/public.pem
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days
  issuer: auth-service

# Application Security Settings
app:
  security:
    rate-limit:
      login-requests-per-minute: 10
      api-requests-per-minute: 100
    account-lockout:
      max-failed-attempts: 5
      lockout-duration-minutes: 30
    password-policy:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special-char: true
      max-age-days: 90
    api-key:
      max-keys-per-user: 10
      default-expiry-days: 365
    two-factor:
      force-admins: false
      force-all: false
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:4200,http://localhost:5173"
      allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allowed-headers: "*"
      max-age: 3600
    ip-whitelist:
      enabled: false
      allowed-ips: "127.0.0.1,::1"

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.auth: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auth-service.log
